    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header id="header">
        <h1 class="logo">
            <a href="./index.html">
                <img src="./img/pc/pc_header_logo.png" alt="ebb&flowロゴ">
            </a>
        </h1>
        <nav class="header_nav">
            <ul>
                <li><a href="">concept</a></li>

                <li><a href="">works</a></li>
                <li><a href="">skill</a></li>
                <li><a href="">contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="contact-page">
        <div class="contact-page-inner">
        <h2>お問い合わせフォーム</h2>
        <div class="form-grop">
            <label for="user-name">お名前 / 会社名</label>
            <input type="text" id="user-name" name="user-name" placeholder="山田　太郎" required>
        </div>
        <div class="form-grop">
            <label for="user-kana">フリガナ</label>
            <input type="text" id="user-kana" name="user-kana" placeholder="ヤマダ　タロウ" required>
        </div>
        <div class="form-grop">
            <label for="user-mail">メールアドレス</label>
            <input type="text" id="user-mail" name="user-mail" placeholder="sample@xxxxx.co.jp" required>
        </div>
        <div class="form-grop">
            <label for="message">お問い合わせ内容</label>
            <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
        </div>
        </div>

        <div class="contact-text">
            <p>お問い合わせの際に入力していただいた個人情報は、<br>
                お問い合わせへの対応およびご連絡のために<br>
                利用いたします。<br>
                ご提供いただいた個人情報は、<br>
                ご本人の同意なく第三者へ開示・提供することはありません。</p>
        </div>
    </section>

    
    
</body>
